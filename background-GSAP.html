<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background</title>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"
      defer
    ></script>
    <script
      src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"
      defer
    ></script>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --clr-1: hsla(248, 100%, 68%, 0.6);
        --clr-2: hsla(188, 100%, 54%, 0.45);
        --clr-3: hsla(322, 100%, 62%, 0.42);
        --clr-4: hsla(142, 100%, 52%, 0.32);
        --clr-5: hsla(36, 100%, 58%, 0.36);
      }

      html,
      body {
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Base Mesh Gradient ── */
      #bg-mesh {
        position: fixed;
        inset: 0;
        z-index: -10;
        background:
          radial-gradient(
            ellipse at 15% 5%,
            hsla(248, 100%, 9%, 1) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 85% 95%,
            hsla(188, 80%, 6%, 1) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 50% 50%,
            hsla(248, 50%, 6%, 0.6) 0%,
            transparent 70%
          ),
          #04040f;
      }

      /* ── Orbs ── */
      .orb {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        will-change: transform;
        z-index: -9;
      }
      #orb1 {
        width: 680px;
        height: 680px;
        top: 2%;
        left: 8%;
        background: radial-gradient(
          circle at 38% 38%,
          var(--clr-1),
          transparent 68%
        );
        filter: blur(110px);
      }
      #orb2 {
        width: 500px;
        height: 500px;
        top: 52%;
        right: 6%;
        background: radial-gradient(
          circle at 38% 38%,
          var(--clr-2),
          transparent 68%
        );
        filter: blur(95px);
      }
      #orb3 {
        width: 420px;
        height: 420px;
        top: 78%;
        left: 22%;
        background: radial-gradient(
          circle at 38% 38%,
          var(--clr-3),
          transparent 68%
        );
        filter: blur(85px);
      }
      #orb4 {
        width: 340px;
        height: 340px;
        top: 28%;
        right: 28%;
        background: radial-gradient(
          circle at 38% 38%,
          var(--clr-4),
          transparent 68%
        );
        filter: blur(75px);
      }
      #orb5 {
        width: 270px;
        height: 270px;
        top: 14%;
        right: 12%;
        background: radial-gradient(
          circle at 38% 38%,
          var(--clr-5),
          transparent 68%
        );
        filter: blur(65px);
      }

      /* ── Noise, Vignette ── */
      #bg-noise {
        position: fixed;
        inset: 0;
        z-index: -8;
        pointer-events: none;
        opacity: 0.55;
        mix-blend-mode: overlay;
      }
      #bg-vignette {
        position: fixed;
        inset: 0;
        z-index: -7;
        pointer-events: none;
        background: radial-gradient(
          ellipse at 50% 50%,
          transparent 45%,
          rgba(0, 0, 0, 0.65) 100%
        );
      }

      /* ── KONTEN KAMU DI SINI ── */
      body {
        color: #fff;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- Background Layers -->
    <div id="bg-mesh" aria-hidden="true"></div>
    <div id="orb1" class="orb" aria-hidden="true"></div>
    <div id="orb2" class="orb" aria-hidden="true"></div>
    <div id="orb3" class="orb" aria-hidden="true"></div>
    <div id="orb4" class="orb" aria-hidden="true"></div>
    <div id="orb5" class="orb" aria-hidden="true"></div>
    <canvas id="bg-noise" aria-hidden="true"></canvas>
    <div id="bg-vignette" aria-hidden="true"></div>

    <!-- ✏️ KONTEN KAMU MULAI DI SINI -->

    <!-- ✏️ KONTEN KAMU SELESAI DI SINI -->

    <script>
      window.addEventListener("load", () => {
        // 1. Noise Canvas
        const canvas = document.getElementById("bg-noise");
        const ctx = canvas.getContext("2d");
        function drawNoise() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          const img = ctx.createImageData(canvas.width, canvas.height);
          for (let i = 0; i < img.data.length; i += 4) {
            const v = (Math.random() * 255) | 0;
            img.data[i] = v;
            img.data[i + 1] = v;
            img.data[i + 2] = v;
            img.data[i + 3] = 20;
          }
          ctx.putImageData(img, 0, 0);
        }
        drawNoise();
        window.addEventListener("resize", drawNoise);

        // 2. Lenis
        const lenis = new Lenis({
          duration: 1.4,
          smoothWheel: true,
          wheelMultiplier: 0.85,
        });
        gsap.registerPlugin(ScrollTrigger);
        gsap.ticker.add((t) => lenis.raf(t * 1000));
        gsap.ticker.lagSmoothing(0);
        lenis.on("scroll", ScrollTrigger.update);

        // 3. Orbs floating
        const orbs = [
          { el: "#orb1", fx: 65, fy: 42, dur: 9, delay: 0 },
          { el: "#orb2", fx: -52, fy: -38, dur: 11, delay: 1.8 },
          { el: "#orb3", fx: 48, fy: -56, dur: 8, delay: 0.9 },
          { el: "#orb4", fx: -38, fy: 50, dur: 13, delay: 2.8 },
          { el: "#orb5", fx: 32, fy: -44, dur: 10, delay: 3.5 },
        ];
        orbs.forEach((o) => {
          gsap.to(o.el, {
            x: o.fx,
            y: o.fy,
            duration: o.dur,
            delay: o.delay,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
          });
          gsap.to(o.el, {
            scale: 1.14,
            duration: o.dur * 0.7,
            delay: o.delay + 0.8,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
          });
        });

        // 4. Orbs parallax on scroll
        const speeds = [-16, -28, -20, -13, -24];
        orbs.forEach((o, i) => {
          gsap.to(o.el, {
            y: `+=${speeds[i]}%`,
            ease: "none",
            scrollTrigger: {
              trigger: document.body,
              start: "top top",
              end: "bottom bottom",
              scrub: 1.8,
            },
          });
        });
      });
    </script>
  </body>
</html>
